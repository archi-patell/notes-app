 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App - Modern & Responsive</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Bootstrap CSS for layout utilities (optional) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <h1 class="app-title">
                    <span class="app-icon">📝</span>
                    Notes
                </h1>
            </div>
            
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="Search your notes..."
                    aria-label="Search notes"
                >
                <button type="button" id="search-btn">Search</button>
                <button type="button" id="reset-btn">Reset</button>
            </div>

            <div class="header-right">
                <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
                    <span class="theme-icon"><i class="bi bi-cloud-sun-fill"></i></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Add Note Form Section -->
        <section class="add-note-section">
            <div class="add-note-container">
                <h2 class="section-title">Create a New Note</h2>
                <form class="add-note-form" name="add-note" aria-label="Add new note form">
                    <div class="form-group">
                        <input 
                            type="text" 
                            class="form-input form-input-title" 
                            placeholder="Note title..." 
                            maxlength="100"
                            aria-label="Note title"
                            name="title"
                        >
                    </div>
                    
                    <div class="form-group">
                        <textarea 
                            class="form-input form-textarea" 
                            placeholder="Start typing your note..." 
                            rows="4"
                            maxlength="5000"
                            aria-label="Note content"
                            name="content"
                        ></textarea>
                    </div>

                    <div class="form-group">
                        <select name="category" class="form-input" id="category">
                            <option value="">Select a category</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="reset" class="btn btn-secondary">Clear</button>
                        <button type="submit" class="btn btn-primary">Add Note</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Notes Grid Section -->
        <section class="notes-section">
            <div class="section-header">
                <h2 class="section-title">Your Notes</h2>
                <div class="view-options">
                    <button class="view-toggle active" data-view="grid" title="Grid view">
                        <span>⊞</span>
                    </button>
                    <button class="view-toggle" data-view="list" title="List view">
                        <span>≡</span>
                    </button>
                </div>
            </div>

            <!-- Notes Grid Container -->
            <div class="notes-grid"></div>

            <!-- Empty State Section (Hidden by default) -->
            <div class="empty-state hidden">
                <div class="empty-state-content">
                    <div class="empty-icon">📭</div>
                    <h3 class="empty-title">No Notes Yet</h3>
                    <p class="empty-description">
                        Create your first note using the form above to get started!
                    </p>
                    <button class="btn btn-primary">Create a Note</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">&copy; 2026 Notes App. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
